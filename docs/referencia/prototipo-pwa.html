<!-- ─────────────────────────── DATA + ROUTER ─────────────────────────── -->
<script>
// ─────────── MOCK DATA ───────────
const APRENDICES = [
  { ficha: '31145789', nombre: 'Luis Gerardo Gómez',     documento: '80123456', foto: 'https://i.pravatar.cc/100?img=12' },
  { ficha: '465789',   nombre: 'Pedro Luis Gómez',        documento: '80234567', foto: 'https://i.pravatar.cc/100?img=33' },
  { ficha: '789003',   nombre: 'Camilo Daniel Escudero',  documento: '80345678', foto: 'https://i.pravatar.cc/100?img=8' },
  { ficha: '120544',   nombre: 'Ana Lucía Herrera',       documento: '80456789', foto: 'https://i.pravatar.cc/100?img=47' },
  { ficha: '334512',   nombre: 'Diego Pérez Castillo',    documento: '80567890', foto: 'https://i.pravatar.cc/100?img=15' },
  { ficha: '887421',   nombre: 'María Camila Rojas',      documento: '80678901', foto: 'https://i.pravatar.cc/100?img=44' },
  { ficha: '210907',   nombre: 'Andrés Felipe Mora',      documento: '80789012', foto: 'https://i.pravatar.cc/100?img=18' },
  { ficha: '992100',   nombre: 'Valentina Suárez',        documento: '80890123', foto: 'https://i.pravatar.cc/100?img=49' },
];

// Estado del día: ficha → { estado, hora }
let HOY = {
  '31145789': { estado: 'Presente',    hora: '07:02' },
  '465789':   { estado: 'Presente',    hora: '07:05' },
  '789003':   { estado: 'Tarde',       hora: '07:34' },
  '887421':   { estado: 'Justificado', hora: '07:00' },
};

const HISTORICO = [
  { fecha: '2026-05-22', label: 'Ayer · vie 22 may',     presente: 7, tarde: 1, justificado: 0, ausente: 0, total: 8 },
  { fecha: '2026-05-21', label: 'jue 21 may',            presente: 6, tarde: 1, justificado: 1, ausente: 0, total: 8 },
  { fecha: '2026-05-20', label: 'mié 20 may',            presente: 5, tarde: 2, justificado: 1, ausente: 0, total: 8 },
  { fecha: '2026-05-19', label: 'mar 19 may',            presente: 8, tarde: 0, justificado: 0, ausente: 0, total: 8 },
  { fecha: '2026-05-16', label: 'sáb 16 may · festivo',  presente: 0, tarde: 0, justificado: 0, ausente: 0, total: 0 },
];

// Matriz histórica de los últimos 10 días lectivos (oldest → newest).
// Estados: P=Presente, T=Tarde, J=Justificado, A=Ausente.
// El último elemento del array es el día más reciente registrado.
// dias[0] = hace 9 días; dias[9] = ayer (no incluye HOY)
const ASISTENCIA_HIST = {
  '31145789': ['P','P','P','P','P','P','P','P','P','P'], // Luis — perfecta
  '465789':   ['P','T','P','P','P','P','P','T','P','P'], // Pedro — 2 tardes scattered
  '789003':   ['P','P','A','T','P','P','T','A','P','T'], // Camilo — 2 ausencias disco
  '120544':   ['P','A','P','A','P','A','P','J','P','P'], // Ana — 3 discontinuas + 1 just
  '334512':   ['P','P','P','A','A','A','A','A','P','P'], // Diego — racha de 5 atrás, luego mejoró
  '887421':   ['P','P','J','P','P','J','P','P','P','J'], // María — todas justificadas
  '210907':   ['P','A','P','A','P','A','P','A','A','A'], // Andrés — racha actual de 3 + scattered
  '992100':   ['P','P','P','P','A','A','A','A','A','A'], // Valentina — racha actual de 6 — ALERTA
};
const DIAS_LABEL = ['lun 12','mar 13','mié 14','jue 15','vie 16','lun 19','mar 20','mié 21','jue 22','vie 23'];
const DIAS_SEMANA = ['lun','mar','mié','jue','vie','lun','mar','mié','jue','vie'];

let LAST_ACTION = null;

const ESTADOS = {
  Presente:    { color: 'state-presente',    bg: 'state-presente-bg',    icon: 'check' },
  Tarde:       { color: 'state-tarde',       bg: 'state-tarde-bg',       icon: 'clock' },
  Justificado: { color: 'state-justificado', bg: 'state-justificado-bg', icon: 'shield' },
  Ausente:     { color: 'state-ausente',     bg: 'state-ausente-bg',     icon: 'x' },
};

const ICONS = {
  check:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  clock:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  shield:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  x:       '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  search:  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  plus:    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  qr:      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3z"/><path d="M20 14v3"/><path d="M17 20h4"/><path d="M14 20v1"/></svg>',
  undo:    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>',
  download:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  chevron: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
};

// ─────────── HELPERS ───────────
function $(s, root = document) { return root.querySelector(s); }
function fichaActivos() { return APRENDICES.length; } // todos activos en mock
function presentesHoy() { return Object.values(HOY).filter(s => s.estado === 'Presente' || s.estado === 'Tarde').length; }
function faltantesHoy() { return APRENDICES.filter(a => !HOY[a.ficha]); }
function pillHTML(estado) {
  const e = ESTADOS[estado];
  if (!e) return '';
  return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-${e.color} bg-${e.bg} text-[11px] font-semibold">${ICONS[e.icon]}<span>${estado}</span></span>`;
}
function avatarHTML(a, size = 40) {
  return `<div class="shrink-0 rounded-full bg-muted overflow-hidden" style="width:${size}px;height:${size}px"><img src="${a.foto}" alt="" loading="lazy" class="w-full h-full object-cover" onerror="this.style.display='none'"></div>`;
}

// ─── ANALYTICS ───
function statsAprendiz(ficha) {
  const arr = ASISTENCIA_HIST[ficha] || [];
  const total = arr.length;
  const presente = arr.filter(d => d === 'P').length;
  const tarde = arr.filter(d => d === 'T').length;
  const justificado = arr.filter(d => d === 'J').length;
  const ausente = arr.filter(d => d === 'A').length;
  // computa: efectivo = P+T (asistió aunque tarde), J cuenta neutro
  const dias_validos = total - justificado;
  const asistio = presente + tarde;
  const pct = dias_validos > 0 ? Math.round((asistio / dias_validos) * 100) : 100;
  // racha actual de ausencias (consecutivas desde el día más reciente)
  let racha_actual = 0;
  for (let i = arr.length - 1; i >= 0; i--) {
    if (arr[i] === 'A') racha_actual++;
    else break;
  }
  // racha máxima histórica
  let racha_max = 0, cur = 0;
  for (const d of arr) {
    if (d === 'A') { cur++; racha_max = Math.max(racha_max, cur); }
    else cur = 0;
  }
  // ausencias discontinuas (total ausencias - racha actual)
  const ausencias_disco = ausente - racha_actual;
  // riesgo: SENA típicamente exige >=80% asistencia. Marcamos riesgo si <80% o racha actual >=3
  const en_riesgo = pct < 80 || racha_actual >= 3;
  return { total, presente, tarde, justificado, ausente, pct, racha_actual, racha_max, ausencias_disco, en_riesgo, dias_validos, asistio };
}
function statsGrupo() {
  const fichas = APRENDICES.map(a => a.ficha);
  const stats = fichas.map(f => statsAprendiz(f));
  const pct_promedio = Math.round(stats.reduce((s, x) => s + x.pct, 0) / stats.length);
  const en_riesgo = stats.filter(x => x.en_riesgo).length;
  const total_tardes = stats.reduce((s, x) => s + x.tarde, 0);
  const total_ausencias = stats.reduce((s, x) => s + x.ausente, 0);
  const perfectos = stats.filter(x => x.pct === 100).length;
  // mejor/peor día semana — agregamos por índice (0..9) y agrupamos por DIAS_SEMANA
  const por_dia = {};
  for (let i = 0; i < 10; i++) {
    const dia = DIAS_SEMANA[i];
    if (!por_dia[dia]) por_dia[dia] = { asis: 0, total: 0 };
    for (const f of fichas) {
      const d = (ASISTENCIA_HIST[f] || [])[i];
      if (d && d !== 'J') {
        por_dia[dia].total++;
        if (d === 'P' || d === 'T') por_dia[dia].asis++;
      }
    }
  }
  const dias = ['lun','mar','mié','jue','vie'];
  const con_pct = dias.map(d => ({ dia: d, pct: por_dia[d].total ? Math.round((por_dia[d].asis / por_dia[d].total) * 100) : 0 }));
  const mejor = con_pct.reduce((a, b) => a.pct >= b.pct ? a : b);
  const peor = con_pct.reduce((a, b) => a.pct <= b.pct ? a : b);
  return { pct_promedio, en_riesgo, total_tardes, total_ausencias, perfectos, mejor, peor, por_dia: con_pct };
}
function toast(msg, opts = {}) {
  const el = document.createElement('div');
  el.className = 'pointer-events-auto inline-flex items-center gap-3 px-4 py-2.5 rounded-xl bg-primary text-on-primary shadow-2xl text-sm font-medium animate-[fadeUp_180ms_ease-out]';
  el.innerHTML = opts.undo
    ? `<span>${msg}</span><button class="text-accent-soft font-semibold underline-offset-2 hover:underline" onclick="doUndo()">deshacer</button>`
    : `<span>${msg}</span>`;
  $('#toast').innerHTML = '';
  $('#toast').appendChild(el);
  if (!opts.persist) setTimeout(() => el.remove(), opts.duration || 3200);
}

// ─────────── ACTIONS ───────────
function marcar(ficha, estado) {
  const prev = HOY[ficha];
  LAST_ACTION = { ficha, prev };
  const now = new Date();
  HOY[ficha] = {
    estado,
    hora: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
  };
  const a = APRENDICES.find(x => x.ficha === ficha);
  toast(`${estado} · ${a ? a.nombre.split(' ')[0] : ficha}`, { undo: true });
  render();
}
function doUndo() {
  if (!LAST_ACTION) return;
  const { ficha, prev } = LAST_ACTION;
  if (prev) HOY[ficha] = prev; else delete HOY[ficha];
  LAST_ACTION = null;
  $('#toast').innerHTML = '';
  render();
}

const VIEWS = {};
function navigate(view) {
  if (!VIEWS[view]) view = 'hoy';
  location.hash = '#' + view;
}
function render() {
  const view = (location.hash.replace('#','') || 'hoy');
  const active = VIEWS[view] ? view : 'hoy';
  $('#view').innerHTML = VIEWS[active]();
  $('#view').scrollTop = 0;
  // top bar context
  $('#topbar-sub').textContent = SUBTITLES[active] || '';
  // nav active
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.setAttribute('data-active', btn.dataset.nav === active);
  });
}

          <div class="text-[11px] text-muted-fg mt-0.5">
            <span class="text-state-presente font-medium">${g.mejor.dia} mejor (${g.mejor.pct}%)</span> ·
            <span class="text-state-ausente font-medium">${g.peor.dia} peor (${g.peor.pct}%)</span>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-5 gap-3 mt-4">
        ${g.por_dia.map(d => {
          const px = Math.max(8, Math.round((d.pct / 100) * 56));
          const isMax = d.dia === g.mejor.dia;
          const isMin = d.dia === g.peor.dia;
          return `
            <div class="flex flex-col items-center gap-1.5">
              <div class="text-[10px] font-semibold tabular-nums ${isMax ? 'text-state-presente' : isMin ? 'text-state-ausente' : 'text-muted-fg'}">${d.pct}%</div>
              <div class="w-full h-14 flex items-end">
                <div class="w-full rounded-md transition-all ${isMax ? 'bg-state-presente' : isMin ? 'bg-state-ausente' : 'bg-primary/70'}" style="height: ${px}px"></div>
              </div>
              <div class="text-[10px] text-muted-fg font-medium">${d.dia}</div>
            </div>
          `;
        }).join('')}
      </div>
    </section>

    <!-- SESIONES (compact) -->
    <section>
      <div class="flex items-baseline justify-between mb-3">
        <h2 class="text-base font-semibold tracking-tight">Sesiones recientes</h2>
        <button class="inline-flex items-center gap-1 text-xs font-semibold text-accent hover:text-accent-soft transition-colors">
          ${ICONS.download}<span>CSV</span>
        </button>
      </div>
      <div class="rounded-2xl bg-surface border border-border divide-y divide-border overflow-hidden">
        ${HISTORICO.slice(0, 4).map(s => {
          const isFestivo = s.total === 0;
          const pct = s.total ? Math.round(((s.presente + s.tarde) / s.total) * 100) : 0;
          return `
          <button class="w-full text-left px-4 py-3 hover:bg-muted/30 transition-colors flex items-center gap-3">
            <div class="flex-1 min-w-0">
              <div class="text-[13px] font-medium">${s.label}</div>
              ${!isFestivo ? `
                <div class="text-[10px] text-muted-fg mt-0.5 tabular-nums">
                  ${s.presente}P · ${s.tarde}T · ${s.justificado}J · ${s.total - s.presente - s.tarde - s.justificado}A
                </div>
              ` : `<div class="text-[10px] text-muted-fg mt-0.5">sin sesión</div>`}
            </div>
            ${!isFestivo ? `
              <div class="text-right">
                <div class="text-sm font-bold tabular-nums">${pct}%</div>
              </div>
            ` : ''}
            <span class="text-muted-fg/60 ml-1">${ICONS.chevron}</span>
          </button>
          `;
        }).join('')}
      </div>
    </section>
  </div>
  `;
};
